---
name: Python Checks for Pull Requests
on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
jobs:
  changes:
      name: Detect Python file changes
      runs-on: ubuntu-latest
      outputs:
        python_changed: ${{ steps.diff.outputs.python_changed }}
      steps:
        - name: Check out repo
          uses: actions/checkout@v5
        - id: diff
          name: Detect python file changes
          run: |
            set -euo pipefail
            base_sha="${{ github.event.pull_request.base.sha }}"
            git fetch --no-tags --depth=1 origin "$base_sha"
            if git diff --name-only "$base_sha" HEAD | grep -q '\.py$'; then
              echo "python_changed=true" >> $GITHUB_OUTPUT
              echo "Python files changed"
            else
              echo "python_changed=false" >> $GITHUB_OUTPUT
              echo "No Python files changed"
            fi
  python:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.python_changed == 'true'
    steps:
      - name: Check out repo
        uses: actions/checkout@v5
      - name: Black Lint
        uses: psf/black@stable
      - name: Setup python environment for flake8 check
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: flake8 Lint
        uses: py-actions/flake8@v2
      - name: Run pytest
        run: |
          python -m pip install -r jira-ci/requirements.txt
          pytest
